name: Build & Push Docker Image

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

env:
  DOCKER_IMAGE_BACKEND: ${{ secrets.DOCKERHUB_USERNAME }}/Cake-Shop-backend
  DOCKER_IMAGE_CHATBOT: ${{ secrets.DOCKERHUB_USERNAME }}/Cake-Shop-chatbot
  DOCKER_IMAGE_FRONTEND: ${{ secrets.DOCKERHUB_USERNAME }}/Cake-Shop-frontend

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: checkout code
      uses: actions/checkout@v4

    - name: Login to Docker
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_TOKEN }}
      
    - name: Build the Docker image
      run: docker/setup-buildx-action@v3  

    - name: Build and Push Chatbot (Python)
      uses: docker/build-push-action@v6
      with:
        context: ./chatbot
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE_CHATBOT }}:latest
          ${{ env.DOCKER_IMAGE_CHATBOT }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: typr=gha,mode=max
    
    - name: Build and Push Backend (Node.js)
      uses: docker/build-push-action@v6
      with:
        context: ./backend
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE_BACKEND }}:latest
          ${{ env.DOCKER_IMAGE_BACKEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: typr=gha,mode=max
        
    - name: Build and Push Frontend (React)
      uses: docker/build-push-action@v6
      with:
        context: ./frontend
        push: true
        tags: |
          ${{ env.DOCKER_IMAGE_FRONTEND }}:latest
          ${{ env.DOCKER_IMAGE_FRONTEND }}:${{ github.sha }}
        cache-from: type=gha
        cache-to: typr=gha,mode=max

    - name: Create .env for build context
      run: |
        echo "DB_NAME=${{ secrets.DB_NAME }}" >> .env
        echo "DB_USER=${{ secrets.DB_USER }}" >> .env
        echo "DB_PASSWORD=${{ secrets.DB_PASSWORD }}" >> .env
        echo "JWT_SECRET=${{ secrets.JWT_SECRET }}" >> .env
        echo "OLLAMA_BASE_URL=${{ secrets.OLLAMA_BASE_URL }}" >> .env
